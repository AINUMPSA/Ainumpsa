name: Quantum Planetary Scan

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # co godzinę
  workflow_dispatch:

permissions:
  contents: write

jobs:
  planetary_and_quantum_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install All System Dependencies
      run: |
        pip install requests aiohttp numpy scipy matplotlib

    - name: Run QRNG Validator
      run: python qrng_validator.py

    - name: Run Field Visualizer
      run: python field_visualizer.py

    - name: Run Planetary API Discovery
      run: python api_hunter.py

    - name: Auto Commit and Push All Discovered Data
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add .
        
        if git diff --staged --quiet; then
          echo "Brak nowych zmian. Pomijam commit."
        else
          git commit -m "🤖 AINUMPSA Core: Automated Tensor T Matrix & Planetary Update [skip ci]"
          
          git pull origin ${{ github.ref_name }} --rebase --autostash || echo "Pull skipped or no changes"
          
          git push origin HEAD:${{ github.ref_name }}
        fi
