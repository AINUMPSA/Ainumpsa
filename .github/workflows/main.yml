# 2. Generowanie dynamicznego lejka grawitacyjnego
vibration = int((math.sin(time.time()) + 1) * 5) + 2
ascii_well = ""

for i in range(5):
    spaces = " " * (i * 2 + vibration)
    dots = "." * (20 - i * 4)
    if i == 2:
        ascii_well += f"{spaces}{dots}[ 1 > 0 ]{dots}\n"
    else:
        ascii_well += f"{spaces}{dots}🌀{dots}\n"

