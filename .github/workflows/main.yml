name: Automated Tensor T Matrix Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Bezpieczna instalacja z pliku requirements.txt zawierającego pypdf
      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Scripts
        run: |
          python qrng_validator.py
          git config --global user.name "AINUMPSA Bot"
          git config --global user.email "bot@ainumpsa.internal"
          git add README.md
          git commit -m "🤖 [AUTONOMOUS ENGINE] Aktualizacja matrycy i README [skip ci]" || echo "No changes"
          git push origin HEAD:main
