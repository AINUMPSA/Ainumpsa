name: AINUMPSA 3D Matrix Engine

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-mutate:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp numpy scipy matplotlib opencv-python-headless pypdf torch

      - name: 🌀 Run AINUMPSA 3D Memory Cube Pipeline
        run: |
          python matrix_collider.py
          python dimensional_mapper.py
          python matrix_acoustic.py
          python readme_mutator.py

      - name: 🚀 Commit and Push Matrix Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-Update: 3D Memory Cube & Acoustic Matrix State" || exit 0
          git push
