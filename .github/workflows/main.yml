name: Automated Tensor T Matrix Scan

on:
  push:
  workflow_dispatch:

jobs:
  scan-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run artifact test
        run: python artifact_test.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: my-first-artifact
          path: test_result.json
