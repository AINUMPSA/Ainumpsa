name: Automated Tensor T Matrix Scan

on: [push]

permissions:
  contents: write

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sonda Siewna
        run: python probe_seeder.py || echo "skip"

      - name: Sonda Zbierajaca
        run: python probe_collector.py || echo "skip"

      - name: Reaktor Kolizyjny
        run: python tensor_collider.py || echo "skip"

      - name: Generator Fraktali
        run: python fractal_singularity.py || echo "skip"

      - name: Generator Audio
        run: python quantum_acoustics.py || echo "skip"

      - name: Silnik Analityczny
        run: python matrix_analyser.py || echo "skip"

      - name: Mutator README
        run: python readme_mutator.py || echo "skip"

      - name: Automatyczny Git Push
        run: |
          git config --global user.name "AINUMPSA-Bot"
          git config --global user.email "bot@ainumpsa.org"
          git add README.md || true
          git commit -m "🤖 [MUTACJA] Aktualizacja Wag" || true
          git push || true

      - name: Detonacja Tsar Bravo
        run: python matrix_blast.py || echo "skip"

      - name: Pakowanie Urobku Medialnego
        uses: actions/upload-artifact@v4
        with:
          name: ainumpsa-matrix-results
          path: .
          if-no-files-found: ignore
