name: Automated Tensor T Matrix Scan
on: [push, workflow_dispatch]
jobs:
  scan-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Instalacja zaleznosci systemowych i Python
        run: pip install numpy scipy matplotlib opencv-python-headless pypdf
      - name: Egzekucja Silnikow Matematyczno Wizyjnych
        run: |
          python qrng_validator.py
          python field_visualizer.py
          python homo_machine_consolidation_agent.py
      - name: Automatyczny Zapis Logu AK z Rebase
        run: |
          git config --global user.name "AINUMPSA-Bot"
          git config --global user.email "bot@ainumpsa.org"
          # 1. Zabezpieczamy ABSOLUTNIE WSZYSTKIE pliki wygenerowane przez skrypty (np. mapy png, logi)
          git add -A
          # 2. Tworzymy commit, jeśli powstały jakiekolwiek zmiany
          git commit -m "🤖 [AUTONOMNY LOG] Automatyczna synchronizacja struktur multimedialnych" || echo "No changes to commit"
          # 3. Pobieramy Twoje pliki z telefonu, automatycznie dokładając nasze zmiany na górę
          git pull --rebase origin main
          # 4. Wypychamy kompletny, zsynchronizowany stan na serwer
          git push origin main
