name: Quantum Planetary Scan

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # Odpalaj automatycznie co godzinę
  workflow_dispatch: # Pozwala odpalić ręcznie jednym kliknięciem

permissions:
  contents: write

jobs:
  planetary_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        pip install requests aiohttp

    - name: Run Planetary API Discovery
      run: python api_hunter.py

    - name: Auto Commit and Push Discovered Data
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add quantum_scan_output.json
        
        if git diff --staged --quiet; then
          echo "Brak nowych zmian w telemetrii. Pomijam commit."
        else
          git commit -m "🤖 AINUMPSA Core: Automatyczna aktualizacja danych planetarnych"
          git push origin HEAD:${{ github.ref_name }}
        fi
