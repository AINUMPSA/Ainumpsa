name: Automated Tensor T Matrix Scan
on: [push, workflow_dispatch]
jobs:
  scan-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - run: python -m pip install --upgrade pip && pip install numpy scipy matplotlib torch
      - run: python qrng_validator.py || true
      - run: python tensor_t_nn.py || true
      - run: python field_visualizer.py || true
