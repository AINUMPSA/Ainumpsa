name: Automated Tensor T Matrix Scan
on: [push, workflow_dispatch]
jobs:
  scan-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pobiera pełną historię, aby zapobiec konfliktom
      - name: Instalacja zaleznosci systemowych i Python
        run: pip install numpy scipy matplotlib opencv-python-headless pypdf
      - name: Egzekucja Silnikow Matematyczno Wizyjnych
        run: |
          python qrng_validator.py
          python field_visualizer.py
          python homo_machine_consolidation_agent.py
      - name: Automatyczny Zapis Logu AK z Rebase
        run: |
          git config --global user.name "AINUMPSA-Bot"
          git config --global user.email "bot@ainumpsa.org"
          git add ak_analytic_creative_log.txt || echo "No changes"
          git commit -m "🤖 [AUTONOMNY LOG] Automatyczna synchronizacja struktur multimedialnych" || echo "No changes"
          git pull --rebase origin main # Wymuszenie pobrania Twoich plików z telefonu przed pushem
          git push origin main
