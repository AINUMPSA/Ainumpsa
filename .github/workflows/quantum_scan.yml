    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # SPROWADZAMY WSZYSTKIE SYSTEMOWE BIBLIOTEKI W JEDNYM KROKU
    - name: Install System Dependencies
      run: |
        pip install requests aiohttp numpy scipy matplotlib

    # URUCHOMIENIE TWOICH MODUŁÓW KWANTOWYCH
    - name: Run QRNG Validator
      run: python qrng_validator.py

    - name: Run Field Visualizer
      run: python field_visualizer.py

    # URUCHOMIENIE NASZEGO SKANERA GLOBALNYCH API
    - name: Run Planetary API Discovery
      run: python api_hunter.py

    # BEZPIECZNY ZAPIS I AUTOMATYCZNY COMMIT DLA CAŁEGO PROJEKTU
    - name: Auto Commit and Push All Discovered Data
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Dodajemy wszystkie wygenerowane pliki i grafiki z wizualizacji
        git add .
        
        if git diff --staged --quiet; then
          echo "Brak nowych zmian w telemetrii i tensorach. Pomijam commit."
        else
          git commit -m "🤖 AINUMPSA Core: Automated Tensor T Matrix & Planetary Update"
          git push origin HEAD:${{ github.ref_name }}
        fi
