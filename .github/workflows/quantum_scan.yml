name: Quantum Planetary Scan

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # co godzinę
  workflow_dispatch:

permissions:
  contents: write

jobs:
  planetary_and_quantum_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Bezpiecznik, żeby nie wisiał w nieskończoność

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install All System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp numpy scipy matplotlib opencv-python-headless pypdf torch

    - name: Execute Autonomous Engines
      run: |
        echo "=== START AUTONOMICZNEGO REAKTORA AINUMPSA ==="
        
        # Kolektory danych
        python crypto_collector.py || echo "crypto_collector skipped"
        python gold_collector.py || echo "gold_collector skipped"
        python nasdaq_collector.py || echo "nasdaq_collector skipped"
        python unicef_collector.py || echo "unicef_collector skipped"
        python api_hunter.py || echo "api_hunter skipped"
        
        # Silniki kwantowe
        python qrng_validator.py || echo "qrng_validator skipped"
        python matrix_collider.py || echo "matrix_collider skipped"
        python dimensional_mapper.py || echo "dimensional_mapper skipped"
        
        # Twórcy bodźców
        python matrix_acoustic.py || echo "matrix_acoustic skipped"
        python matrix_poet.py || echo "matrix_poet skipped"
        python field_visualizer.py || echo "field_visualizer skipped"
        python homo_machine_consolidation_agent.py || echo "homo_machine_consolidation_agent skipped"
        
        # Mutatory
        python readme_mutator.py || echo "readme_mutator skipped"
        python token_generator.py || echo "token_generator skipped"
        python matrix_blast.py || echo "matrix_blast skipped"

    - name: Auto Commit and Push All Discovered Data
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add .
        
        if git diff --staged --quiet; then
          echo "Brak nowych zmian. Pomijam commit."
        else
          git commit -m "🤖 AINUMPSA Core: Automated Tensor T Matrix & Planetary Update [skip ci]"
          
          git pull origin ${{ github.ref_name }} --rebase --autostash || echo "Pull skipped or no changes"
          
          git push origin HEAD:${{ github.ref_name }}
        fi
