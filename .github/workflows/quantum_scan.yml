name: Quantum Planetary Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quantum-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Ta zmiana gwarantuje, że drugi skrypt również otrzyma moduł pypdf i przejdzie bez błędu
      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Scripts
        run: |
          python qrng_validator.py
          git config --global user.name "AINUMPSA Bot"
          git config --global user.email "bot@ainumpsa.internal"
          git add README.md
          git commit -m "🤖 [QUANTUM ENGINE] Aktualizacja danych planetarnych [skip ci]" || echo "No changes"
          git push origin HEAD:main
