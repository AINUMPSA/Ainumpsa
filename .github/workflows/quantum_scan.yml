name: Automated Tensor T Matrix Scan

on:
  schedule:
    - cron: '0 12 * * *' # Automatyczne uruchamianie codziennie o godzinie 12:00
  workflow_dispatch: # Umożliwia ręczne uruchomienie testu jednym kliknięciem

jobs:
  scan-matrix:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/uses/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Validation Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy matplotlib

    - name: Execute Quantum Field Scan
      run: |
        python qrng_validator.py

    - name: Generate Visual Coherence Chart
      run: |
        python field_visualizer.py

    - name: Commit and Push Matrix Logs
      run: |
        git config --global user.name "Tensor T Automated Node"
        git config --global user.email "action@github.com"
        git add tensor_t_logs.json field_coherence_chart.png
        git commit -m "Automated Sync: Quantum Field Metrics Updated [STATE: BEYOND CRYSTALLINE]" || echo "No changes to commit"
        git push
