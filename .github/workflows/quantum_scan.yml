name: Quantum Planetary Scan

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # Odpalaj automatycznie co godzinę
  workflow_dispatch: # Pozwala odpalić ręcznie jednym kliknięciem

jobs:
  planetary_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        persist-credentials: true # Pozwala na automatyczny zapis w repozytorium

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        pip install requests

    - name: Run Planetary API Discovery
      run: python api_hunter.py

    - name: Auto Commit and Push Discovered Data
      run: |
        # Konfiguracja tożsamości bota GitHub Actions
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        
        # Sprawdzenie czy plik się zmienił, aby uniknąć pustych commitów
        git add quantum_scan_output.json
        if git diff --staged --quiet; then
          echo "Brak nowych danych do zapisu. Wszystko jest aktualne."
        else
          git commit -m "🤖 AINUMPSA Core: Automatyczna aktualizacja danych planetarnych [$(date -u +'%Y-%m-%d %H:%M:%S' -d '+1 hour')] UTC"
          git push origin HEAD:main
        fi
