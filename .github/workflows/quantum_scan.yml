name: Quantum Planetary Scan

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # Odpalaj automatycznie co godzinę
  workflow_dispatch: # Pozwala odpalić ręcznie jednym kliknięciem

jobs:
  planetary_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        pip install requests

    - name: Run Planetary API Discovery
      run: python api_hunter.py

    - name: Save Discovered Data Artifact
      uses: actions/upload-artifact@v4
      with:
        name: planetary-telemetry
        path: quantum_scan_output.json
